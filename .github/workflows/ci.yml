name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  commitlint:
    if: github.event_name == 'pull_request'
    uses: madrigal-eschat/dev-events-mqtt/.github/workflows/_commitlint.yml@main
    with:
      from-sha: ${{ github.event.pull_request.base.sha }}
      to-sha: ${{ github.event.pull_request.head.sha }}

  ci:
    uses: madrigal-eschat/dev-events-mqtt/.github/workflows/_kotlin-ci.yml@main

  coverage:
    if: github.event_name == 'pull_request'
    uses: madrigal-eschat/dev-events-mqtt/.github/workflows/_kotlin-coverage.yml@main
    with:
      base-ref: ${{ github.base_ref }}

  release:
    if: github.event_name == 'push'
    needs: ci
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: madrigal-eschat/dev-events-mqtt/.github/workflows/_semrel.yml@main
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

  build-and-attach:
    if: needs.release.outputs.released == 'true'
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build plugin distribution
        run: ./gradlew buildPlugin

      - name: Attach plugin zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release.outputs.tag }}" build/distributions/*.zip --clobber
